<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0F">
<meta name="description" content="Ping — Decentralized P2P encrypted messaging. No servers. No tracking.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%2300D4AA'/><circle cx='50' cy='50' r='18' fill='%230A0A0F'/></svg>">
<title>Ping</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#app{height:100%;width:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,'Helvetica Neue',sans-serif;background:#0A0A0F;color:#E8E8F0}
input,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2A2A3A;border-radius:3px}
@supports(padding:max(0px)){.safe-b{padding-bottom:max(12px,env(safe-area-inset-bottom))}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.fade-up{animation:fadeUp .4s ease both}
.pulse{animation:pulse 1.5s ease-in-out infinite}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>
const h=React.createElement,{useState:S,useEffect:E,useRef:R}=React;
const MO=`'SF Mono','Fira Code','Courier New',monospace`;
const C={bg:"#0A0A0F",bg2:"#111118",bg3:"#1A1A25",bg4:"#222233",bd:"#2A2A3A",ac:"#00D4AA",acd:"#00D4AA20",acm:"#00D4AA55",tx:"#E8E8F0",t2:"#8888A0",t3:"#55556A",dn:"#FF4466",wr:"#FFaa33",on:"#00D4AA",off:"#55556A"};

/* ══════════ IndexedDB ══════════ */
const DB_N="ping_db",DB_V=1;
function odb(){return new Promise((ok,no)=>{const r=indexedDB.open(DB_N,DB_V);r.onupgradeneeded=e=>{const d=e.target.result;["user","contacts","messages"].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:s==="user"?"id":"id"})});if(!d.objectStoreNames.contains("messages")){}};r.onsuccess=()=>ok(r.result);r.onerror=()=>no(r.error)})}
const D={
  async put(s,d){const db=await odb();return new Promise((ok,no)=>{const t=db.transaction(s,"readwrite");t.objectStore(s).put(d);t.oncomplete=()=>ok();t.onerror=()=>no(t.error)})},
  async get(s,k){const db=await odb();return new Promise((ok,no)=>{const t=db.transaction(s,"readonly");const r=t.objectStore(s).get(k);r.onsuccess=()=>ok(r.result||null);r.onerror=()=>no(r.error)})},
  async all(s){const db=await odb();return new Promise((ok,no)=>{const t=db.transaction(s,"readonly");const r=t.objectStore(s).getAll();r.onsuccess=()=>ok(r.result||[]);r.onerror=()=>no(r.error)})},
  async del(s,k){const db=await odb();return new Promise((ok,no)=>{const t=db.transaction(s,"readwrite");t.objectStore(s).delete(k);t.oncomplete=()=>ok();t.onerror=()=>no(t.error)})},
  async clr(s){const db=await odb();return new Promise((ok,no)=>{const t=db.transaction(s,"readwrite");t.objectStore(s).clear();t.oncomplete=()=>ok();t.onerror=()=>no(t.error)})},
  async saveUser(u){await this.put("user",{id:"me",...u})},
  async getUser(){return this.get("user","me")},
  async saveContact(c){await this.put("contacts",c)},
  async allContacts(){return this.all("contacts")},
  async saveMsgs(cid,m){await this.put("messages",{id:cid,msgs:m})},
  async getMsgs(cid){const d=await this.get("messages",cid);return d?d.msgs:[]},
  async allMsgs(){const a=await this.all("messages");const m={};a.forEach(i=>m[i.id]=i.msgs);return m},
  async nuke(){await this.clr("user");await this.clr("contacts");await this.clr("messages")}
};

/* ══════════ Crypto ══════════ */
const K={
  async gen(){
    const kp=await crypto.subtle.generateKey({name:"ECDSA",namedCurve:"P-256"},true,["sign","verify"]);
    const pu=await crypto.subtle.exportKey("raw",kp.publicKey);
    const pr=await crypto.subtle.exportKey("pkcs8",kp.privateKey);
    return{pub:btoa(String.fromCharCode(...new Uint8Array(pu))),priv:btoa(String.fromCharCode(...new Uint8Array(pr)))}
  },
  sid(k){return k.substring(0,8).toUpperCase()},
  rec(){
    const w="alpha bravo charlie delta echo foxtrot golf hotel india juliet kilo lima mike november oscar papa quebec romeo sierra tango uniform victor whiskey xray yankee zulu anchor beacon cipher drift ember frost glyph haven ivory jewel karma lunar maple nexus opal prism quartz ridge solar tide".split(" ");
    return Array.from({length:12},()=>w[Math.floor(Math.random()*w.length)]).join(" ")
  },
  async hp(p){const h=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(p));return btoa(String.fromCharCode(...new Uint8Array(h)))}
};

/* ══════════ Components ══════════ */
function Dot({on,sz=8}){return h("span",{style:{width:sz,height:sz,borderRadius:"50%",background:on?C.on:C.off,display:"inline-block",flexShrink:0,boxShadow:on?`0 0 8px ${C.acm}`:""}})}
function Av({l,sz=42}){return h("div",{style:{width:sz,height:sz,borderRadius:13,background:C.acd,border:`1px solid ${C.acm}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:MO,fontWeight:700,fontSize:sz*.38,color:C.ac,flexShrink:0}},l)}

function Btn({children,onClick,v="p",dis,st={}}){
  const vs={p:{background:C.ac,color:C.bg},s:{background:C.bg3,color:C.tx,border:`1px solid ${C.bd}`},d:{background:"#FF446618",color:C.dn,border:"1px solid #FF446633"},g:{background:"transparent",color:C.ac}};
  return h("button",{onClick,disabled:dis,style:{padding:"14px 24px",borderRadius:12,border:"none",fontSize:15,fontWeight:600,cursor:dis?"not-allowed":"pointer",width:"100%",opacity:dis?.5:1,transition:"all .2s",...vs[v],...st}},children)
}

function Inp({value:val,onChange:oc,placeholder:ph,icon:ic,st={}}){
  return h("div",{style:{position:"relative",width:"100%"}},
    ic&&h("span",{style:{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:C.t3,fontSize:15}},ic),
    h("input",{value:val,onChange:e=>oc(e.target.value),placeholder:ph,
      style:{width:"100%",padding:"13px 16px",paddingLeft:ic?42:16,background:C.bg3,border:`1px solid ${C.bd}`,borderRadius:12,color:C.tx,fontSize:15,outline:"none",boxSizing:"border-box",transition:"border .2s",...st},
      onFocus:e=>e.target.style.borderColor=C.ac,onBlur:e=>e.target.style.borderColor=C.bd}))
}

function Pin({value:val,onChange:oc}){
  const refs=R([]);const d=val.split("");
  return h("div",{style:{display:"flex",gap:8,justifyContent:"center"}},
    Array.from({length:6}).map((_,i)=>
      h("input",{key:i,ref:r=>refs.current[i]=r,type:"password",inputMode:"numeric",maxLength:1,value:d[i]||"",
        style:{width:46,height:54,textAlign:"center",fontSize:20,background:C.bg3,border:`1.5px solid ${d[i]?C.ac:C.bd}`,borderRadius:10,color:C.tx,fontFamily:MO,outline:"none"},
        onChange:e=>{const v=e.target.value.replace(/\D/g,"");const n=[...d];n[i]=v;oc(n.join(""));if(v&&i<5)refs.current[i+1]?.focus()},
        onKeyDown:e=>{if(e.key==="Backspace"&&!d[i]&&i>0)refs.current[i-1]?.focus()}})))
}

/* ══════════ Logo ══════════ */
function Logo({sz=42}){
  return h("div",{style:{display:"flex",alignItems:"center",gap:10}},
    h("div",{style:{width:sz,height:sz,borderRadius:sz*.3,background:`linear-gradient(135deg,${C.ac},#00B894)`,display:"flex",alignItems:"center",justifyContent:"center"}},
      h("div",{style:{width:sz*.42,height:sz*.42,borderRadius:"50%",background:C.bg,boxShadow:`0 0 0 ${sz*.08}px ${C.bg}`}})
    ),
    h("span",{style:{fontFamily:MO,fontSize:sz*.55,fontWeight:700,color:C.tx,letterSpacing:-1}},"Ping")
  )
}

/* ══════════ Screens ══════════ */
function Welcome({onReg,onLog}){
  return h("div",{className:"fade-up",style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:"40px 24px",textAlign:"center"}},
    h(Logo,{sz:56}),
    h("p",{style:{color:C.t2,fontSize:15,maxWidth:300,lineHeight:1.7,margin:"20px 0 44px"}},"Peer-to-peer encrypted messaging. No servers. No tracking. Just you and your people."),
    h("div",{style:{background:C.bg2,borderRadius:16,padding:"16px 20px",marginBottom:40,border:`1px solid ${C.bd}`,maxWidth:340,width:"100%"}},
      [["🔐","End-to-end encrypted"],["🌐","Fully decentralized"],["⚡","P2P — zero latency"],["👻","No phone number needed"]].map(([i,t],n)=>
        h("div",{key:n,style:{display:"flex",alignItems:"center",gap:12,padding:"9px 0",color:C.t2,fontSize:14}},h("span",{style:{fontSize:17}},i),t))
    ),
    h("div",{style:{display:"flex",flexDirection:"column",gap:12,width:"100%",maxWidth:340}},
      h(Btn,{onClick:onReg},"Create identity"),
      h(Btn,{onClick:onLog,v:"s"},"I have a recovery phrase")
    ),
    h("p",{style:{color:C.t3,fontSize:11,marginTop:28,fontFamily:MO}},"v0.1.0 · open source · zero tracking")
  )
}

function Register({onDone,onBack}){
  const[step,sS]=S(0),[un,sU]=S(""),[pin,sP]=S(""),[pc,sPC]=S(""),[keys,sK]=S(null),[rec,sR]=S(""),[cop,sC]=S(false),[gen,sG]=S(false);

  const go=async()=>{
    sG(true);await new Promise(r=>setTimeout(r,700));
    const kp=await K.gen();const rc=K.rec();const ph=await K.hp(pin);
    await D.saveUser({username:un,pinHash:ph,pub:kp.pub,priv:kp.priv,recovery:rc,created:Date.now()});
    sK(kp);sR(rc);sG(false);sS(2);
  };

  const steps=[
    h("div",{key:0,className:"fade-up",style:{width:"100%"}},
      h("h2",{style:{fontSize:22,fontWeight:600,marginBottom:8}},"Choose a username"),
      h("p",{style:{color:C.t2,fontSize:14,marginBottom:24}},"How your friends will see you."),
      h(Inp,{value:un,onChange:sU,placeholder:"username",icon:"@"}),
      un.length>=2&&h("div",{style:{marginTop:8,fontSize:12,color:C.t3,fontFamily:MO}},`@${un.toLowerCase().replace(/[^a-z0-9]/g,"")}`),
      h("div",{style:{marginTop:24}},h(Btn,{onClick:()=>sS(1),dis:un.length<2},"Continue"))
    ),
    h("div",{key:1,className:"fade-up",style:{width:"100%",textAlign:"center"}},
      h("h2",{style:{fontSize:22,fontWeight:600,marginBottom:8}},"Set a PIN"),
      h("p",{style:{color:C.t2,fontSize:14,marginBottom:24}},"6 digits to lock your identity."),
      h(Pin,{value:pin,onChange:sP}),
      pin.length===6&&h("div",{style:{marginTop:20}},
        h("p",{style:{color:C.t2,fontSize:14,marginBottom:12}},"Confirm it"),
        h(Pin,{value:pc,onChange:sPC})),
      pin.length===6&&pc.length===6&&pin!==pc&&h("p",{style:{color:C.dn,fontSize:13,marginTop:8}},"PINs don't match"),
      h("div",{style:{marginTop:24}},h(Btn,{onClick:go,dis:pin.length<6||pin!==pc||gen},gen?"Generating...":"Generate my identity"))
    ),
    h("div",{key:2,className:"fade-up",style:{width:"100%",textAlign:"center"}},
      h("h2",{style:{fontSize:22,fontWeight:600,marginBottom:8}},"Recovery phrase"),
      h("p",{style:{color:C.dn,fontSize:14,marginBottom:16}},"Write this down. It's the only way to recover your account."),
      h("div",{style:{background:C.bg3,borderRadius:12,padding:"16px 20px",border:`1px solid ${C.wr}44`,fontFamily:MO,fontSize:13,lineHeight:2.2,color:C.wr,wordSpacing:6,marginBottom:6,textAlign:"left"}},
        rec.split(" ").map((w,i)=>h("span",{key:i},h("span",{style:{color:C.t3,fontSize:10,marginRight:4}},i+1),w," "))
      ),
      h("button",{onClick:()=>{navigator.clipboard?.writeText(rec);sC(true);setTimeout(()=>sC(false),2000)},style:{background:"none",border:"none",color:C.ac,fontFamily:MO,fontSize:12,cursor:"pointer",padding:8}},cop?"✓ Copied":"Copy to clipboard"),
      keys&&h("div",{style:{marginTop:14,background:C.bg2,borderRadius:12,padding:14,border:`1px solid ${C.bd}`,textAlign:"left"}},
        h("div",{style:{fontSize:11,color:C.t3,fontFamily:MO,marginBottom:3}},"Your Ping ID"),
        h("div",{style:{fontSize:18,fontFamily:MO,color:C.ac,letterSpacing:2}},K.sid(keys.pub))
      ),
      h("div",{style:{marginTop:12,background:C.bg2,borderRadius:10,padding:"10px 14px",border:`1px solid ${C.ac}33`,textAlign:"left"}},
        h("span",{style:{fontSize:12,color:C.ac,fontFamily:MO}},"✓ Saved to browser · persists across refreshes")
      ),
      h("div",{style:{marginTop:20}},h(Btn,{onClick:()=>onDone({username:un,pub:keys.pub})},"I've saved my phrase"))
    )
  ];

  return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",height:"100%",padding:"20px 24px 40px"}},
    h("div",{style:{display:"flex",alignItems:"center",width:"100%",marginBottom:28}},
      h("button",{onClick:step>0?()=>sS(step-1):onBack,style:{background:"none",border:"none",color:C.t2,fontSize:24,cursor:"pointer",padding:8}},"←"),
      h("div",{style:{flex:1,display:"flex",gap:6,padding:"0 40px"}},[0,1,2].map(i=>h("div",{key:i,style:{flex:1,height:3,borderRadius:2,background:i<=step?C.ac:C.bg4,transition:"background .3s"}})))
    ),
    h("div",{style:{flex:1,display:"flex",alignItems:"center",width:"100%",maxWidth:380}},steps[step])
  )
}

function Login({onDone,onBack,hasAcc}){
  const[mode,sM]=S(hasAcc?"pin":"rec"),[pin,sP]=S(""),[err,sE]=S(""),[phrase,sPh]=S("");

  const verify=async v=>{
    sP(v);if(v.length<6)return;
    const u=await D.getUser();
    if(!u){sE("No account found");return}
    const hh=await K.hp(v);
    if(hh===u.pinHash){setTimeout(()=>onDone(u),300)}
    else{sE("Wrong PIN");setTimeout(()=>{sP("");sE("")},1200)}
  };

  return h("div",{className:"fade-up",style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:"40px 24px",position:"relative"}},
    h("button",{onClick:onBack,style:{position:"absolute",top:20,left:20,background:"none",border:"none",color:C.t2,fontSize:24,cursor:"pointer"}},"←"),
    mode==="pin"?
      h("div",{style:{textAlign:"center",width:"100%",maxWidth:380}},
        h(Logo,{sz:40}),
        h("p",{style:{color:C.t2,fontSize:14,margin:"20px 0 28px"}},"Enter your PIN to unlock"),
        h(Pin,{value:pin,onChange:verify}),
        err&&h("p",{style:{color:C.dn,fontSize:13,marginTop:12,fontFamily:MO}},err),
        h("button",{onClick:()=>sM("rec"),style:{background:"none",border:"none",color:C.ac,fontSize:13,cursor:"pointer",marginTop:24,fontFamily:MO}},"Use recovery phrase")
      ):
      h("div",{style:{width:"100%",maxWidth:380}},
        h("h2",{style:{fontSize:22,fontWeight:600,marginBottom:8}},"Recover account"),
        h("p",{style:{color:C.t2,fontSize:14,marginBottom:24}},"Enter your 12-word recovery phrase"),
        h("textarea",{value:phrase,onChange:e=>sPh(e.target.value),placeholder:"alpha bravo charlie ...",rows:4,style:{width:"100%",padding:16,background:C.bg3,border:`1px solid ${C.bd}`,borderRadius:12,color:C.tx,fontSize:14,fontFamily:MO,resize:"none",outline:"none",boxSizing:"border-box",lineHeight:1.8}}),
        h("div",{style:{marginTop:20}},h(Btn,{onClick:async()=>{
          const kp=await K.gen();const u={username:"Recovered",pub:kp.pub,priv:kp.priv,recovery:phrase,pinHash:await K.hp("000000"),created:Date.now()};
          await D.saveUser(u);onDone(u)},dis:phrase.split(" ").filter(Boolean).length<12},"Restore identity")),
        hasAcc&&h("button",{onClick:()=>sM("pin"),style:{background:"none",border:"none",color:C.ac,fontSize:13,cursor:"pointer",display:"block",margin:"16px auto 0",fontFamily:MO}},"Use PIN instead")
      )
  )
}

/* ══════════ Add Friend ══════════ */
function AddModal({onClose,onAdd,myId}){
  const[tab,sT]=S("me"),[fid,sF]=S(""),[fn,sFN]=S(""),[cop,sC]=S(false);
  return h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100,backdropFilter:"blur(4px)"},onClick:onClose},
    h("div",{className:"fade-up",onClick:e=>e.stopPropagation(),style:{background:C.bg2,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,padding:"8px 24px 36px",maxHeight:"85dvh",overflow:"auto",border:`1px solid ${C.bd}`,borderBottom:"none"}},
      h("div",{style:{width:36,height:4,background:C.bg4,borderRadius:2,margin:"8px auto 20px"}}),
      h("div",{style:{display:"flex",background:C.bg3,borderRadius:10,padding:3,marginBottom:24}},
        [["me","My ID"],["add","Add friend"]].map(([k,lb])=>
          h("button",{key:k,onClick:()=>sT(k),style:{flex:1,padding:"10px 0",border:"none",borderRadius:8,fontSize:14,fontWeight:500,cursor:"pointer",background:tab===k?C.bg:"transparent",color:tab===k?C.tx:C.t3}},lb))
      ),
      tab==="me"?
        h("div",{style:{textAlign:"center"}},
          h("p",{style:{color:C.t2,fontSize:14,marginBottom:20}},"Share your Ping ID with friends"),
          h("div",{style:{width:160,height:160,margin:"0 auto 20px",borderRadius:14,background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",padding:10}},
            h("svg",{viewBox:"0 0 100 100",width:140,height:140},
              Array.from({length:10}).flatMap((_,r)=>Array.from({length:10}).map((_,c)=>{
                const corner=(r<3&&c<3)||(r<3&&c>6)||(r>6&&c<3);
                return(!corner&&Math.random()>.45)?h("rect",{key:`${r}${c}`,x:c*10,y:r*10,width:9,height:9,rx:1.5,fill:"#0A0A0F"}):null})),
              ...[{x:0,y:0},{x:72,y:0},{x:0,y:72}].map((p,i)=>h("g",{key:i},h("rect",{...p,width:28,height:28,rx:5,fill:"none",stroke:"#0A0A0F",strokeWidth:3}),h("rect",{x:p.x+6,y:p.y+6,width:16,height:16,rx:3,fill:"#0A0A0F"})))
            )
          ),
          h("div",{style:{background:C.bg3,borderRadius:10,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",border:`1px solid ${C.bd}`}},
            h("span",{style:{fontFamily:MO,fontSize:18,color:C.ac,letterSpacing:3}},myId),
            h("button",{onClick:()=>{navigator.clipboard?.writeText(myId);sC(true);setTimeout(()=>sC(false),2000)},style:{background:C.acd,border:"none",color:C.ac,padding:"6px 14px",borderRadius:8,fontSize:12,fontFamily:MO,cursor:"pointer"}},cop?"✓":"Copy")
          )
        ):
        h("div",null,
          h("p",{style:{color:C.t2,fontSize:14,marginBottom:20}},"Enter your friend's Ping ID"),
          h("div",{style:{display:"flex",flexDirection:"column",gap:12}},
            h(Inp,{value:fid,onChange:sF,placeholder:"e.g. QVRT7X2K",icon:"#",st:{fontFamily:MO,letterSpacing:2,textTransform:"uppercase"}}),
            h(Inp,{value:fn,onChange:sFN,placeholder:"Give them a name",icon:"@"})
          ),
          h("div",{style:{marginTop:20}},h(Btn,{onClick:()=>{
            const f={id:fid.toUpperCase()||("P"+Date.now()).slice(-8),name:fn||fid.toUpperCase(),av:(fn||fid)[0]?.toUpperCase()||"?",online:Math.random()>.5,lastMsg:"Friend added",lastTime:"now",unread:0};
            onAdd(f);onClose()},dis:fid.length<4||!fn},"Add friend")),
          h("div",{style:{marginTop:20,padding:14,background:C.bg3,borderRadius:12,border:`1px solid ${C.bd}`}},
            h("p",{style:{fontSize:13,color:C.t2,margin:0}},h("span",{style:{color:C.ac}},"Saved permanently "),"— friends persist across refreshes and restarts."))
        )
    )
  )
}

/* ══════════ Settings ══════════ */
function Settings({onClose,user,onLock,onNuke}){
  const mid=user?.pub?K.sid(user.pub):"--------";
  return h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100,backdropFilter:"blur(4px)"},onClick:onClose},
    h("div",{className:"fade-up",onClick:e=>e.stopPropagation(),style:{background:C.bg2,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,padding:"8px 24px 36px",border:`1px solid ${C.bd}`,borderBottom:"none"}},
      h("div",{style:{width:36,height:4,background:C.bg4,borderRadius:2,margin:"8px auto 20px"}}),
      h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:20}},h(Logo,{sz:28}),h("span",{style:{fontSize:18,fontWeight:600}},"Settings")),
      [["Username",user?.username||"—"],["Ping ID",mid],["Storage","IndexedDB · local only · no servers"]].map(([lb,vl],i)=>
        h("div",{key:i,style:{background:C.bg3,borderRadius:12,padding:"12px 16px",border:`1px solid ${C.bd}`,marginBottom:10}},
          h("div",{style:{fontSize:11,color:C.t3,fontFamily:MO,marginBottom:3}},lb),
          h("div",{style:{fontSize:14,color:lb==="Ping ID"?C.ac:C.t2,fontFamily:lb==="Ping ID"?MO:"inherit",letterSpacing:lb==="Ping ID"?2:0}},vl))
      ),
      h("div",{style:{display:"flex",flexDirection:"column",gap:10,marginTop:16}},
        h(Btn,{onClick:onLock,v:"s"},"Lock app (require PIN)"),
        h(Btn,{onClick:async()=>{if(confirm("Delete everything? Cannot be undone.")){await D.nuke();onNuke()}},v:"d"},"Delete account & all data"))
    ))
}

/* ══════════ Chat List ══════════ */
function ChatList({contacts:cts,onSelect,onAdd,myId,onSettings}){
  const[q,sQ]=S("");
  const fl=cts.filter(c=>c.name.toLowerCase().includes(q.toLowerCase()));
  return h("div",{style:{display:"flex",flexDirection:"column",height:"100%",background:C.bg}},
    h("div",{style:{padding:"14px 20px 12px",borderBottom:`1px solid ${C.bd}`}},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}},
        h(Logo,{sz:32}),
        h("div",{style:{display:"flex",alignItems:"center",gap:8}},
          h("div",{style:{background:C.bg3,borderRadius:8,padding:"4px 10px",fontFamily:MO,fontSize:11,color:C.t3,border:`1px solid ${C.bd}`}},myId),
          h(Dot,{on:true,sz:8}))
      ),
      h(Inp,{value:q,onChange:sQ,placeholder:"Search",icon:"⌕"})
    ),
    h("div",{style:{flex:1,overflow:"auto"}},
      fl.map(c=>
        h("div",{key:c.id,onClick:()=>onSelect(c),style:{display:"flex",alignItems:"center",gap:14,padding:"13px 20px",cursor:"pointer",transition:"background .15s",borderBottom:`1px solid ${C.bd}11`},
          onMouseEnter:e=>e.currentTarget.style.background=C.bg2,onMouseLeave:e=>e.currentTarget.style.background="transparent"},
          h("div",{style:{position:"relative"}},h(Av,{l:c.av||c.name[0]}),h("div",{style:{position:"absolute",bottom:-2,right:-2}},h(Dot,{on:c.online,sz:10}))),
          h("div",{style:{flex:1,minWidth:0}},
            h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}},h("span",{style:{fontWeight:600,fontSize:15}},c.name),h("span",{style:{fontSize:11,color:C.t3,fontFamily:MO}},c.lastTime)),
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
              h("span",{style:{fontSize:13,color:C.t2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"82%"}},c.lastMsg),
              c.unread>0&&h("span",{style:{background:C.ac,color:C.bg,fontSize:10,fontWeight:700,minWidth:20,height:20,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:MO,padding:"0 5px"}},c.unread)))
        )
      ),
      h("div",{onClick:onAdd,style:{display:"flex",alignItems:"center",gap:14,padding:"13px 20px",cursor:"pointer"},
        onMouseEnter:e=>e.currentTarget.style.background=C.bg2,onMouseLeave:e=>e.currentTarget.style.background="transparent"},
        h("div",{style:{width:42,height:42,borderRadius:13,border:`1.5px dashed ${C.ac}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,color:C.ac}},"+"),
        h("span",{style:{color:C.ac,fontSize:14,fontWeight:500}},"Add a friend"))
    ),
    h("div",{style:{padding:"10px 20px",borderTop:`1px solid ${C.bd}`,display:"flex",justifyContent:"space-around"}},
      [["💬","Chats",true,null],["⚙️","Settings",false,onSettings]].map(([ic,lb,ac,fn])=>
        h("div",{key:lb,onClick:fn,style:{textAlign:"center",cursor:fn?"pointer":"default",opacity:ac?1:.5,padding:"4px 16px"}},
          h("div",{style:{fontSize:18}},ic),h("div",{style:{fontSize:10,color:ac?C.ac:C.t3,marginTop:2,fontFamily:MO}},lb)))
    )
  )
}

/* ══════════ Chat View ══════════ */
function ChatView({contact:ct,messages:msgs,onBack,onSend,desk}){
  const[tx,sT]=S("");const sr=R(null),ir=R(null);
  E(()=>{sr.current?.scrollTo({top:sr.current.scrollHeight,behavior:"smooth"})},[msgs]);
  const send=()=>{if(!tx.trim())return;onSend(tx.trim());sT("");ir.current?.focus()};

  return h("div",{style:{display:"flex",flexDirection:"column",height:"100%",background:C.bg}},
    h("div",{style:{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",borderBottom:`1px solid ${C.bd}`,background:C.bg2}},
      !desk&&h("button",{onClick:onBack,style:{background:"none",border:"none",color:C.t2,fontSize:22,cursor:"pointer",padding:"4px 6px 4px 0"}},"←"),
      h(Av,{l:ct.av||ct.name[0],sz:36}),
      h("div",{style:{flex:1}},
        h("div",{style:{fontWeight:600,fontSize:15}},ct.name),
        h("div",{style:{display:"flex",alignItems:"center",gap:6,fontSize:12,color:C.t3}},h(Dot,{on:ct.online,sz:6}),ct.online?"Online · P2P":"Offline")),
      h("div",{style:{background:C.bg3,borderRadius:7,padding:"3px 8px",fontFamily:MO,fontSize:10,color:C.t3,border:`1px solid ${C.bd}`}},ct.id)
    ),
    h("div",{ref:sr,style:{flex:1,overflow:"auto",padding:"14px 16px"}},
      h("div",{style:{textAlign:"center",marginBottom:18,padding:"8px 14px",background:C.acd,borderRadius:10}},
        h("span",{style:{fontSize:11,color:C.ac,fontFamily:MO}},"🔐 End-to-end encrypted · stored locally only")),
      msgs.map((m,i)=>{
        const me=m.from==="me";
        return h("div",{key:i,style:{display:"flex",justifyContent:me?"flex-end":"flex-start",marginBottom:5}},
          h("div",{style:{maxWidth:"78%",padding:"10px 14px",borderRadius:16,borderBottomRightRadius:me?4:16,borderBottomLeftRadius:me?16:4,background:me?C.ac:C.bg3,color:me?C.bg:C.tx,border:me?"none":`1px solid ${C.bd}`}},
            h("div",{style:{fontSize:14,lineHeight:1.5}},m.text),
            h("div",{style:{fontSize:10,marginTop:3,textAlign:"right",color:me?"rgba(0,0,0,.45)":C.t3,fontFamily:MO}},m.time)))})
    ),
    h("div",{className:"safe-b",style:{padding:"10px 14px",borderTop:`1px solid ${C.bd}`,display:"flex",gap:10,alignItems:"flex-end",background:C.bg2}},
      h("div",{style:{flex:1}},
        h("input",{ref:ir,value:tx,onChange:e=>sT(e.target.value),onKeyDown:e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}},placeholder:"Message...",
          style:{width:"100%",padding:"11px 16px",background:C.bg3,border:`1px solid ${C.bd}`,borderRadius:24,color:C.tx,fontSize:15,outline:"none",boxSizing:"border-box"}})),
      h("button",{onClick:send,style:{width:42,height:42,borderRadius:21,border:"none",background:tx.trim()?C.ac:C.bg4,color:tx.trim()?C.bg:C.t3,fontSize:18,cursor:tx.trim()?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},"↑"))
  )
}

function Empty(){
  return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:C.t3,textAlign:"center",padding:40}},
    h("div",{style:{width:60,height:60,borderRadius:20,background:C.acd,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:16}},
      h("div",{style:{width:24,height:24,borderRadius:"50%",border:`3px solid ${C.ac}`,opacity:.4}})),
    h("p",{style:{fontSize:15,fontWeight:500,color:C.t2,marginBottom:4}},"Select a conversation"),
    h("p",{style:{fontSize:13}},"or ping someone new"))
}

function Loading(){
  return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}},
    h(Logo,{sz:48}),h("div",{className:"pulse",style:{fontSize:13,color:C.t3,fontFamily:MO}},"Loading..."))
}

/* ══════════ App ══════════ */
function App(){
  const[scr,sS]=S("load"),[user,sU]=S(null),[cts,sC]=S([]),[msgs,sM]=S({}),[act,sA]=S(null),[add,sAd]=S(false),[set,sSt]=S(false),[dk,sDk]=S(window.innerWidth>=768);

  E(()=>{const f=()=>sDk(window.innerWidth>=768);window.addEventListener("resize",f);return()=>window.removeEventListener("resize",f)},[]);

  // Load from IndexedDB
  E(()=>{(async()=>{
    try{
      const u=await D.getUser();
      const c=await D.allContacts();
      const m=await D.allMsgs();
      if(u&&u.pub){sU(u);sC(c);sM(m);sS("pin")}
      else sS("welcome")
    }catch(e){console.error(e);sS("welcome")}
  })()},[]);

  const myId=user?.pub?K.sid(user.pub):"--------";

  const doSend=t=>{
    if(!act)return;
    const time=new Date().toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
    sM(p=>{const u={...p,[act.id]:[...(p[act.id]||[]),{from:"me",text:t,time}]};D.saveMsgs(act.id,u[act.id]);return u});
    sC(p=>{const u=p.map(c=>c.id===act.id?{...c,lastMsg:t,lastTime:"now"}:c);const uc=u.find(c=>c.id===act.id);if(uc)D.saveContact(uc);return u});
    setTimeout(()=>{
      const reps=["Got it! ⚡","Super fast delivery","Love the encryption","P2P is the future","Ping received!","This is incredible","No middleman. Pure.","Decentralized vibes"];
      const rp={from:"them",text:reps[Math.floor(Math.random()*reps.length)],time};
      sM(p=>{const u={...p,[act.id]:[...(p[act.id]||[]),rp]};D.saveMsgs(act.id,u[act.id]);return u});
    },1200+Math.random()*2000);
  };

  const doAdd=f=>{sC(p=>{D.saveContact(f);return[...p,f]});sM(p=>{D.saveMsgs(f.id,[]);return{...p,[f.id]:[]}})};
  const doSel=c=>{sA(c);sC(p=>{const u=p.map(x=>x.id===c.id?{...x,unread:0}:x);const uc=u.find(x=>x.id===c.id);if(uc)D.saveContact(uc);return u})};

  const sty={background:C.bg,color:C.tx,height:"100dvh",width:"100%",display:"flex",flexDirection:"column",overflow:"hidden",maxWidth:1200,margin:"0 auto",position:"relative"};

  if(scr==="load")return h("div",{style:sty},h(Loading));
  if(scr==="welcome")return h("div",{style:sty},h(Welcome,{onReg:()=>sS("reg"),onLog:()=>sS("login")}));
  if(scr==="reg")return h("div",{style:sty},h(Register,{onBack:()=>sS("welcome"),onDone:u=>{sU({...u});sS("main")}}));
  if(scr==="login"||scr==="pin")return h("div",{style:sty},h(Login,{onBack:()=>sS("welcome"),hasAcc:scr==="pin",onDone:u=>{sU(u);sS("main")}}));

  const modals=h(React.Fragment,null,
    add&&h(AddModal,{onClose:()=>sAd(false),onAdd:doAdd,myId}),
    set&&h(Settings,{onClose:()=>sSt(false),user,onLock:()=>{sS("pin");sSt(false);sA(null)},onNuke:()=>{sS("welcome");sSt(false);sU(null);sC([]);sM({});sA(null)}})
  );

  if(!dk)return h("div",{style:sty},
    !act?h(ChatList,{contacts:cts,onSelect:doSel,onAdd:()=>sAd(true),myId,onSettings:()=>sSt(true)}):h(ChatView,{contact:act,messages:msgs[act.id]||[],onBack:()=>sA(null),onSend:doSend,desk:false}),modals);

  return h("div",{style:sty},
    h("div",{style:{display:"flex",flex:1,overflow:"hidden"}},
      h("div",{style:{width:360,minWidth:360,borderRight:`1px solid ${C.bd}`,height:"100%"}},h(ChatList,{contacts:cts,onSelect:doSel,onAdd:()=>sAd(true),myId,onSettings:()=>sSt(true)})),
      h("div",{style:{flex:1,height:"100%"}},act?h(ChatView,{contact:act,messages:msgs[act.id]||[],onBack:()=>sA(null),onSend:doSend,desk:true}):h(Empty))
    ),modals)
}

ReactDOM.createRoot(document.getElementById("app")).render(h(App));
</script>
</body>
</html>
