/* ═══ IndexedDB ═══ */
const DB_N="ping_db",DB_V=2;
function odb(){return new Promise((ok,no)=>{const r=indexedDB.open(DB_N,DB_V);r.onupgradeneeded=e=>{const d=e.target.result;["user","contacts","messages"].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:"id"})})};r.onsuccess=()=>ok(r.result);r.onerror=()=>no(r.error)})}
const D={
  async put(s,d){const db=await odb();return new Promise((ok,no)=>{const t=db.transaction(s,"readwrite");t.objectStore(s).put(d);t.oncomplete=()=>ok();t.onerror=()=>no(t.error)})},
  async get(s,k){const db=await odb();return new Promise((ok,no)=>{const t=db.transaction(s,"readonly");const r=t.objectStore(s).get(k);r.onsuccess=()=>ok(r.result||null);r.onerror=()=>no(r.error)})},
  async all(s){const db=await odb();return new Promise((ok,no)=>{const t=db.transaction(s,"readonly");const r=t.objectStore(s).getAll();r.onsuccess=()=>ok(r.result||[]);r.onerror=()=>no(r.error)})},
  async clr(s){const db=await odb();return new Promise((ok,no)=>{const t=db.transaction(s,"readwrite");t.objectStore(s).clear();t.oncomplete=()=>ok();t.onerror=()=>no(t.error)})},
  async saveUser(u){await this.put("user",{id:"me",...u})},
  async getUser(){return this.get("user","me")},
  async saveContact(c){await this.put("contacts",c)},
  async allContacts(){return this.all("contacts")},
  async saveMsgs(cid,m){await this.put("messages",{id:cid,msgs:m})},
  async allMsgs(){const a=await this.all("messages");const m={};a.forEach(i=>m[i.id]=i.msgs);return m},
  async nuke(){await this.clr("user");await this.clr("contacts");await this.clr("messages")}
};

/* ═══ Crypto ═══ */
const K={
  genId(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let r="";for(let i=0;i<8;i++)r+=c[Math.floor(Math.random()*c.length)];return r},
  rec(){const w="alpha bravo charlie delta echo foxtrot golf hotel india juliet kilo lima mike november oscar papa quebec romeo sierra tango uniform victor whiskey xray anchor beacon cipher drift ember frost glyph haven ivory jewel karma lunar maple nexus opal prism quartz ridge solar tide".split(" ");return Array.from({length:12},()=>w[Math.floor(Math.random()*w.length)]).join(" ")},
  async hp(p){const h=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(p));return btoa(String.fromCharCode(...new Uint8Array(h)))}
};

/* ═══ P2P Network ═══ */
const P2P={
  peer:null,conns:{},cbs:null,myId:null,

  init(pingId,cbs){
    this.myId=pingId;this.cbs=cbs;
    this.peer=new Peer("ping-"+pingId,{debug:0});

    this.peer.on("open",()=>{console.log("[P2P] Online as",pingId);if(cbs.onReady)cbs.onReady()});

    this.peer.on("connection",conn=>this._setup(conn));

    this.peer.on("error",err=>{
      console.log("[P2P] Error:",err.type);
      if(err.type==="peer-unavailable"){
        const fid=err.message?.match(/ping-(\w+)/)?.[1];
        if(fid&&cbs.onPeerOffline)cbs.onPeerOffline(fid);
      }
      if(err.type==="unavailable-id"){
        // ID taken, might be another tab - add random suffix
        this.peer=new Peer("ping-"+pingId+"-"+Math.random().toString(36).slice(2,5),{debug:0});
        this.peer.on("open",()=>{if(cbs.onReady)cbs.onReady()});
        this.peer.on("connection",conn=>this._setup(conn));
      }
    });

    this.peer.on("disconnected",()=>{setTimeout(()=>{try{this.peer.reconnect()}catch(e){}},3000)});
  },

  _setup(conn){
    const rid=conn.peer.replace(/^ping-/,"").replace(/-\w{3}$/,"");
    this.conns[rid]=conn;
    conn.on("open",()=>{if(this.cbs.onPeerOnline)this.cbs.onPeerOnline(rid)});
    conn.on("data",data=>{if(this.cbs.onMessage)this.cbs.onMessage(rid,data)});
    conn.on("close",()=>{delete this.conns[rid];if(this.cbs.onPeerOffline)this.cbs.onPeerOffline(rid)});
  },

  connect(pid){
    if(this.conns[pid]&&this.conns[pid].open)return;
    if(!this.peer||this.peer.destroyed)return;
    const conn=this.peer.connect("ping-"+pid,{reliable:true});
    this._setup(conn);
  },

  send(pid,data){
    const conn=this.conns[pid];
    if(conn&&conn.open){conn.send(data);return true}
    // Try fresh connect
    if(!this.peer||this.peer.destroyed)return false;
    const nc=this.peer.connect("ping-"+pid,{reliable:true});
    this._setup(nc);
    nc.on("open",()=>nc.send(data));
    return true;
  },

  destroy(){if(this.peer){this.peer.destroy();this.peer=null}this.conns={}}
};

/* ═══ Register ═══ */
function Register({onDone,onBack}){
  const[step,sS]=S(0),[un,sU]=S(""),[pin,sP]=S(""),[pc,sPC]=S(""),[myId,sI]=S(""),[rec,sR]=S(""),[cop,sC]=S(false),[gen,sG]=S(false);
  const go=async()=>{
    sG(true);await new Promise(r=>setTimeout(r,600));
    const id=K.genId();const rc=K.rec();const ph=await K.hp(pin);
    await D.saveUser({username:un,pinHash:ph,pingId:id,recovery:rc,created:Date.now()});
    sI(id);sR(rc);sG(false);sS(2);
  };
  const steps=[
    el("div",{key:0,className:"fade-up",style:{width:"100%"}},

    el("div",{key:2,className:"fade-up",style:{width:"100%",textAlign:"center"}},

      el("div",{style:{background:C.bg3,borderRadius:12,padding:"14px 18px",border:`1px solid ${C.wr}44`,fontFamily:MO,fontSize:13,lineHeight:2.2,color:C.wr,textAlign:"left"}},

      el("div",{style:{marginTop:16}},el(Btn,{onClick:()=>onDone({username:un,pingId:myId})},"Start messaging")))

/* ═══ Login ═══ */
function Login({onDone,onBack,hasAcc}){
  const[mode,sM]=S(hasAcc?"pin":"rec"),[pin,sP]=S(""),[err,sE]=S(""),[phrase,sPh]=S("");
  const verify=async v=>{sP(v);if(v.length<6)return;const u=await D.getUser();if(!u){sE("No account");return}const hh=await K.hp(v);if(hh===u.pinHash)setTimeout(()=>onDone(u),300);else{sE("Wrong PIN");setTimeout(()=>{sP("");sE("")},1200)}};
  return el("div",{className:"fade-up",style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:"40px 24px",position:"relative"}},
    el("button",{onClick:onBack,style:{position:"absolute",top:20,left:20,background:"none",border:"none",color:C.t2,fontSize:24,cursor:"pointer"}},"←"),
    mode==="pin"?el("div",{style:{textAlign:"center",width:"100%",maxWidth:380}},
      el(Logo,{sz:40}),el("p",{style:{color:C.t2,fontSize:14,margin:"20px 0 28px"}},"Enter PIN to unlock"),
      el(Pin,{value:pin,onChange:verify}),err&&el("p",{style:{color:C.dn,fontSize:13,marginTop:12,fontFamily:MO}},err),
      el("button",{onClick:()=>sM("rec"),style:{background:"none",border:"none",color:C.ac,fontSize:13,cursor:"pointer",marginTop:24,fontFamily:MO}},"Use recovery phrase")):
    el("div",{style:{width:"100%",maxWidth:380}},
      el("h2",{style:{fontSize:22,fontWeight:600,marginBottom:8}},"Recover account"),
      el("textarea",{value:phrase,onChange:e=>sPh(e.target.value),placeholder:"Enter 12-word phrase...",rows:4,style:{width:"100%",padding:16,background:C.bg3,border:`1px solid ${C.bd}`,borderRadius:12,color:C.tx,fontSize:14,fontFamily:MO,resize:"none",outline:"none",boxSizing:"border-box",lineHeight:1.8,marginTop:16}}),
      el("div",{style:{marginTop:20}},el(Btn,{onClick:async()=>{const id=K.genId();const u={username:"Recovered",pingId:id,recovery:phrase,pinHash:await K.hp("000000"),created:Date.now()};await D.saveUser(u);onDone(u)},dis:phrase.split(" ").filter(Boolean).length<12},"Restore")),
